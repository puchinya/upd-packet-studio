name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build Release
        run: cargo build --release

      - name: Compress Release
        shell: pwsh
        run: |
          mkdir staging
          cp target/release/udp-packet-studio.exe staging/
          cp README.md staging/
          cp LICENSE.md staging/
          cp -Recurse assets staging/assets
          Compress-Archive -Path staging/* -DestinationPath udp-packet-studio-windows.zip


      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: udp-packet-studio-windows.zip
          retention-days: 1

  build-macos:
    name: Build & Notarize (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: |
            x86_64-apple-darwin
            aarch64-apple-darwin

      - name: Import macOS Certificates
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE }}
          P12_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 12)

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          
          # Append the temporary keychain to the user's keychain search list
          security list-keychains -d user -s $KEYCHAIN_PATH $(security list-keychains -d user | tr -d '"')
          
          rm $CERTIFICATE_PATH

      - name: Build Targets
        run: |
          cargo build --release --target x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin

      - name: Create Universal Binary
        run: |
          mkdir -p target/release
          lipo -create \
            target/x86_64-apple-darwin/release/udp-packet-studio \
            target/aarch64-apple-darwin/release/udp-packet-studio \
            -output target/release/udp-packet-studio

      - name: Package, Sign and Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ./scripts/build-macos.sh target/release/udp-packet-studio

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifact
          path: udp-packet-studio.dmg
          retention-days: 1

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-artifact

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-artifact

      - name: Generate Release Notes from Milestone Issues
        id: release_notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ github.ref_name }}"
          echo "Looking for milestone matching tag: $TAG_NAME"
          MILESTONE_NUMBER=$(gh api repos/${{ github.repository }}/milestones \
            --jq ".[] | select(.title == \"$TAG_NAME\") | .number")
          
          if [ -z "$MILESTONE_NUMBER" ]; then
            echo "No milestone found matching tag: $TAG_NAME"
            echo "RELEASE_BODY=Release for $TAG_NAME" >> $GITHUB_ENV
          else
            echo "Found milestone #$MILESTONE_NUMBER"
            ISSUES_JSON=$(gh api repos/${{ github.repository }}/issues \
              -F milestone=$MILESTONE_NUMBER -F state=closed)
            
            echo "## What's Changed in $TAG_NAME" > release_notes.md
            echo "" >> release_notes.md
            echo "$ISSUES_JSON" | jq -r '.[] | "- \(.title) (#\(.number)) @\(.user.login)"' >> release_notes.md
            
            echo "RELEASE_BODY<<EOF" >> $GITHUB_ENV
            cat release_notes.md >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            udp-packet-studio-windows.zip
            udp-packet-studio.dmg
          body: ${{ env.RELEASE_BODY }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
